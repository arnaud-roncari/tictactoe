name: tic_tac_toe
description: "A TicTacToe game with AI opponent using Minimax algorithm. Built for Betclic technical assessment."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.3
  freezed_annotation: ^2.4.4
  logger: ^2.5.0
  intl: ^0.20.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.0

dev_dependencies:
  build_runner: ^2.4.14
  freezed: ^2.5.7
  riverpod_generator: ^2.6.4
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
